# -----------------------------------------------------------
# Genesis AI - PostgreSQL 18 + pgvector 生产级优化配置
# 针对 100万级 RAG 向量检索场景调优
# 注意：此文件已重命名为 postgresql.prod.conf
# -----------------------------------------------------------

# 1. 基础连接配置
listen_addresses = '*'
max_connections = 100
standard_conforming_strings = on

# 2. 内存分配 (假设基础环境为 8GB RAM)
# shared_buffers 建议为系统 RAM 的 25%
shared_buffers = 2GB              

# maintenance_work_mem 极其重要：影响 HNSW 索引构建速度
# 建议设为主内存的 1/16 或更高，执行索引创建时 pgvector 会大量使用
maintenance_work_mem = 512MB      

# work_mem 影响排序和哈希连接性能，RAG 场景建议高一点
work_mem = 32MB                   

# 3. 磁盘 I/O 与 WAL
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# 4. 安全与连接优化
password_encryption = scram-sha-256
idle_in_transaction_session_timeout = 60000 # 1分钟空闲事务自动断开

# 5. 查询规划器配置
# 告诉 PG 操作系统缓存了多少数据，通常设为 RAM 的 75%
effective_cache_size = 6GB        

# 6. 向量检索优化 (pgvector & 并行度)
# 允许 PG 使用多 CPU 核心并行构建索引
max_parallel_maintenance_workers = 2 
max_parallel_workers = 4
max_parallel_workers_per_gather = 2

# 7. 日志记录 (生产环境建议记录慢查询)
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_min_duration_statement = 200ms # 记录超过 200ms 的慢查询
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
