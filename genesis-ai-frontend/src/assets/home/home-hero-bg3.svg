  <circle cx="860" cy="20" r="5"></circle><circle cx="848" cy="58" r="5"></circle>
  <circle cx="870" cy="170" r="5"></circle><circle cx="858" cy="138" r="5"></circle>
  <circle cx="590" cy="170" r="5"></circle><circle cx="600" cy="140" r="5"></circle>
