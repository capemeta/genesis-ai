<svg viewBox="0 0 1400 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
<defs>
  <radialGradient id="v4_bg" cx="68%" cy="50%" r="58%">
    <stop offset="0%" stop-color="#CCDEFF"/>
    <stop offset="60%" stop-color="#DDE8FF"/>
    <stop offset="100%" stop-color="#EAF0FF"/>
  </radialGradient>
  <radialGradient id="v4_purp" cx="85%" cy="85%" r="40%">
    <stop offset="0%" stop-color="#D0C4FF" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#EAF0FF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="v4_fog" cx="13%" cy="52%" r="50%">
    <stop offset="0%" stop-color="#EAF0FF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#EAF0FF" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="v4_wave_fade" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#EAF0FF" stop-opacity="1"/>
    <stop offset="40%" stop-color="#EAF0FF" stop-opacity="0"/>
    <stop offset="100%" stop-color="#EAF0FF" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="v4_left_blend" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#E6EFFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#E6EFFF" stop-opacity="0"/>
  </linearGradient>
  <filter id="v4_glow"><feGaussianBlur stdDeviation="12"/></filter>
</defs>
<rect width="1400" height="260" fill="#E6EFFF"/>
<g transform="translate(500 0)">
<rect width="900" height="260" fill="#E6EFFF"/>
<rect width="900" height="260" fill="url(#v4_bg)"/>
<rect width="900" height="260" fill="url(#v4_purp)"/>

