  <path d="M460,108 Q545,94 630,108 Q715,122 790,108 Q850,97 900,108" stroke="#9A8EE0" stroke-width="0.6" opacity="0.15"/>
  <path d="M460,148 Q545,136 630,148 Q715,160 790,148 Q850,140 900,150" stroke="#9A8EE0" stroke-width="0.6" opacity="0.12"/>
