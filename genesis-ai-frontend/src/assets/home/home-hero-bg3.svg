    <stop offset="100%" stop-color="#EEF2FF" stop-opacity="0"></stop>
  </radialGradient>
</defs>
<rect width="900" height="240" fill="#F0EEFF"></rect>
<rect width="900" height="240" fill="url(#D_center)"></rect>
<rect width="900" height="240" fill="url(#D_blue)"></rect>
