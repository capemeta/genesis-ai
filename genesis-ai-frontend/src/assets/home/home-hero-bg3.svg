<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
<defs>
  <radialGradient id="D_fog" cx="18%" cy="55%" r="50%">
    <stop offset="0%" stop-color="#F3F1FF" stop-opacity="1"></stop>
    <stop offset="100%" stop-color="#F3F1FF" stop-opacity="0"></stop>
  </radialGradient>
  <radialGradient id="D_center" cx="72%" cy="48%" r="40%">
    <stop offset="0%" stop-color="#DDD0FF" stop-opacity="0.85"></stop>
