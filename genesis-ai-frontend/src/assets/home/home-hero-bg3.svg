<circle cx="720" cy="110" r="35" fill="none" stroke="#9A8ED8" stroke-width="0.5" opacity="0.2"></circle>
<circle cx="720" cy="110" r="52" fill="none" stroke="#9A8ED8" stroke-width="0.4" opacity="0.12"></circle>
<rect width="900" height="240" fill="url(#D_fog)"></rect>
