log_format genesis_main escape=json
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for" '
    'rt=$request_time urt=$upstream_response_time uct=$upstream_connect_time uht=$upstream_header_time';

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $http_x_forwarded_proto $origin_scheme {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_x_forwarded_host $origin_host {
    default $http_x_forwarded_host;
    '' $http_host;
}

map $http_x_forwarded_port $origin_port {
    default $http_x_forwarded_port;
    '' $server_port;
}

server {
    listen 80;
    server_name _;
    # 使用 Docker 内置 DNS 动态解析 backend 服务名，避免后端容器重建后 IP 变化导致前端继续访问旧 IP。
    resolver 127.0.0.11 ipv6=off valid=30s;

    # 与后端上传限制保持一致，避免大文件在代理层被提前拒绝。
    client_max_body_size 100m;

    access_log /var/log/nginx/access.log genesis_main;
    error_log /var/log/nginx/error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = ${NGINX_ROOT_PATH_EXACT} {
        return 301 ${NGINX_ROOT_PATH_SLASH};
    }

    location ~* ^${NGINX_ROOT_PATH_PREFIX}/(assets|icons|images)/(.*)$ {
        alias /usr/share/nginx/html/$1/$2;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location ^~ ${NGINX_ROOT_PATH_PREFIX}/api/ {
        set $backend_upstream backend:8200;
        rewrite ^${NGINX_ROOT_PATH_PREFIX}/api/(.*)$ /api/$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $origin_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_scheme;
        proxy_set_header X-Forwarded-Host $origin_host;
        proxy_set_header X-Forwarded-Port $origin_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_request_buffering on;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location ^~ ${NGINX_ROOT_PATH_PREFIX}/uploads/ {
        set $backend_upstream backend:8200;
        rewrite ^${NGINX_ROOT_PATH_PREFIX}/uploads/(.*)$ /uploads/$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $origin_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_scheme;
        proxy_set_header X-Forwarded-Host $origin_host;
        proxy_set_header X-Forwarded-Port $origin_port;
    }

    location ~ ^${NGINX_ROOT_PATH_PREFIX}/(docs|redoc|openapi\.json)$ {
        set $backend_upstream backend:8200;
        rewrite ^${NGINX_ROOT_PATH_PREFIX}/(docs|redoc|openapi\.json)$ /$1 break;
        proxy_pass http://$backend_upstream$is_args$args;
        proxy_http_version 1.1;

        proxy_set_header Host $origin_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $origin_scheme;
        proxy_set_header X-Forwarded-Host $origin_host;
        proxy_set_header X-Forwarded-Port $origin_port;
    }

    location ^~ ${NGINX_ROOT_PATH_PREFIX}/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ ${NGINX_ROOT_PATH_SLASH}index.html;
    }
}
