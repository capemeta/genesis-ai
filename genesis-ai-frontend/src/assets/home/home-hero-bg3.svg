  <line x1="800" y1="50" x2="860" y2="20"></line><line x1="800" y1="50" x2="848" y2="58"></line>
  <line x1="820" y1="155" x2="870" y2="170"></line><line x1="820" y1="155" x2="858" y2="138"></line>
  <line x1="640" y1="155" x2="590" y2="170"></line><line x1="640" y1="155" x2="600" y2="140"></line>
  <line x1="780" y1="190" x2="810" y2="215"></line><line x1="780" y1="190" x2="748" y2="218"></line>
  <line x1="670" y1="190" x2="640" y2="215"></line><line x1="670" y1="190" x2="700" y2="222"></line>
