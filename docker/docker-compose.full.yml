name: genesis-ai-full

# 后端基础构建（不包含 tesseract-ocr，仅用于 backend 和大多数 worker）
x-backend-base: &backend-base
  context: ..
  dockerfile: docker/backend/Dockerfile
  args:
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}

# 专用于 parse-worker 的构建（包含 tesseract-ocr，用于 OCR 解析）
x-parse-build: &parse-build
  context: ..
  dockerfile: docker/backend/Dockerfile.parse
  args:
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}

services:
  postgres:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18-trixie}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PostgreSQL 18+ 推荐挂载到 /var/lib/postgresql，避免旧 data 目录布局导致启动失败。
      - postgres_data:/var/lib/postgresql
      - ./postgresql/dev/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgresql/dev/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh:ro
      - ./postgresql/init-schema.sql:/opt/genesis/bootstrap/init-schema.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8200}:8200"
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8200/api/v1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  parse-worker:
    build: *parse-build
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "parse", "--pool=threads", "--concurrency=1", "--loglevel=info", "-n", "parse@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  chunk-worker:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "chunk", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "chunk@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  enhance-worker:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "enhance", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "enhance@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  train-worker:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "train", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "train@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  websync-worker:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "web_sync", "--pool=threads", "--concurrency=4", "--loglevel=info", "-n", "websync@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  default-worker:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "default", "--pool=threads", "--concurrency=2", "--loglevel=info", "-n", "default@%h"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  celery-beat:
    build: *backend-base
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "celery", "-A", "tasks.celery_tasks", "beat", "--loglevel=info"]
    volumes:
      - backend_storage:/app/genesis-ai-platform/storage-data
      - backend_uploads:/app/genesis-ai-platform/uploads
      - backend_logs:/app/genesis-ai-platform/logs

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-bookworm}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8200}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  seaweedfs:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    restart: unless-stopped
    profiles: ["object-storage"]
    ports:
      - "8301:9333"
      - "8302:8080"
      - "8303:8888"
      - "8304:8333"
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/config/s3.json:/etc/seaweedfs/s3.json:ro
      - ./seaweedfs/config/filer.toml:/etc/seaweedfs/filer.toml:ro
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -s3.port=8333
      -filer
      -volume.max=100
      -master.volumeSizeLimitMB=1024

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_uploads:
  backend_logs:
  seaweedfs_data:
