name: genesis-ai-full

# 后端统一构建：backend / 全部 worker / beat 复用同一个镜像，避免首次冷构建时重复执行 uv sync。
x-backend-base: &backend-base
  context: ..
  dockerfile: docker/backend/Dockerfile
  args:
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}

x-backend-service: &backend-service
  image: ${BACKEND_RUNTIME_IMAGE:-genesis-ai-backend:local}
  restart: unless-stopped
  env_file:
    - ./.env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  volumes:
    - backend_storage:/app/genesis-ai-platform/storage-data
    - backend_uploads:/app/genesis-ai-platform/uploads
    - backend_logs:/app/genesis-ai-platform/logs

services:
  postgres:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg18-trixie}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
    volumes:
      # PostgreSQL 18+ 推荐挂载到 /var/lib/postgresql，避免旧 data 目录布局导致启动失败。
      - postgres_data:/var/lib/postgresql
      - ./postgresql/dev/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgresql/dev/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh:ro
      - ./postgresql/init-schema.sql:/opt/genesis/bootstrap/init-schema.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    <<: *backend-service
    # 信任上游反向代理透传的协议头，确保 HTTPS 入口下 Cookie/URL 判断正确。
    command: ["uv", "run", "--no-dev", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8200", "--proxy-headers", "--forwarded-allow-ips", "*"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8200/api/v1/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  parse-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "parse", "--pool=threads", "--concurrency=1", "--loglevel=info", "-n", "parse@%h"]

  chunk-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "chunk", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "chunk@%h"]

  enhance-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "enhance", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "enhance@%h"]

  train-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "train", "--pool=threads", "--concurrency=3", "--loglevel=info", "-n", "train@%h"]

  websync-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "web_sync", "--pool=threads", "--concurrency=4", "--loglevel=info", "-n", "websync@%h"]

  default-worker:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "worker", "-Q", "default", "--pool=threads", "--concurrency=2", "--loglevel=info", "-n", "default@%h"]

  celery-beat:
    <<: *backend-service
    command: ["uv", "run", "--no-dev", "celery", "-A", "tasks.celery_tasks", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-bookworm}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
        ROOT_PATH: ${ROOT_PATH:-/}
        VITE_API_URL: ${ROOT_PATH:-/}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      ROOT_PATH: ${ROOT_PATH:-/}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:80"
    volumes:
      - frontend_nginx_logs:/var/log/nginx

  seaweedfs:
    # 默认使用原始 Docker Hub 镜像；网络受限时可通过环境变量切换到国内镜像。
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    restart: unless-stopped
    profiles: ["object-storage"]
    ports:
      - "8301:9333"
      - "8302:8080"
      - "8303:8888"
      - "8304:8333"
    volumes:
      - seaweedfs_data:/data
      - ./seaweedfs/config/s3.json:/etc/seaweedfs/s3.json:ro
      - ./seaweedfs/config/filer.toml:/etc/seaweedfs/filer.toml:ro
    command: >
      server
      -dir=/data
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -s3.port=8333
      -filer
      -volume.max=100
      -master.volumeSizeLimitMB=1024

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  backend_uploads:
  backend_logs:
  frontend_nginx_logs:
  seaweedfs_data:
