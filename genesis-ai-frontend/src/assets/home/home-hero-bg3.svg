<!-- core node -->
<circle cx="720" cy="110" r="22" fill="#D0C4FF" stroke="#8A7ED8" stroke-width="1.5" opacity="0.9"></circle>
<circle cx="720" cy="110" r="14" fill="#BEB4F8" stroke="#7A6ED4" stroke-width="1"></circle>
