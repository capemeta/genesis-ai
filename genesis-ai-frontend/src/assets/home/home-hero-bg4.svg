<!-- logo circles -->
<circle cx="700" cy="130" r="66" fill="#D8EEFF" opacity="0.93"/>
<circle cx="700" cy="130" r="54" fill="#A8D0F8" opacity="0.95"/>
<circle cx="700" cy="130" r="41" fill="#6AAEE8" opacity="0.95"/>
<circle cx="700" cy="130" r="29" fill="#2E7DD8" opacity="0.95"/>
<circle cx="700" cy="130" r="18" fill="#0A50B8" opacity="0.95"/>
