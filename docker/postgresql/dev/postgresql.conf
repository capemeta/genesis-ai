# -----------------------------------------------------------
# Genesis AI - PostgreSQL 18 + pgvector 开发环境配置
# 针对 Windows WSL Docker 环境优化（低资源占用）
# 适用于 4-8GB RAM 的开发机器
# -----------------------------------------------------------

# 1. 基础连接配置
listen_addresses = '*'
max_connections = 50              # 开发环境连接数减半
standard_conforming_strings = on

# 2. 内存分配 (针对 4GB RAM 优化)
# shared_buffers 设为较小值，适合开发环境
shared_buffers = 512MB            # 生产环境的 1/4

# maintenance_work_mem 用于索引构建，开发环境可以小一些
maintenance_work_mem = 128MB      # 生产环境的 1/4

# work_mem 影响查询性能，开发环境适度降低
work_mem = 16MB                   # 生产环境的 1/2

# 3. 磁盘 I/O 与 WAL (开发环境可以更激进)
wal_level = replica               # PG18+ 默认要求至少 replica 才能启动
max_wal_size = 512MB              # 减少 WAL 大小
min_wal_size = 128MB
checkpoint_timeout = 10min        # 更频繁的检查点
checkpoint_completion_target = 0.9
fsync = off                       # 开发环境可关闭以提升性能（注意：不适合生产）
synchronous_commit = off          # 异步提交，提升写入速度

# 4. 安全与连接优化
password_encryption = scram-sha-256
idle_in_transaction_session_timeout = 60000 # 1分钟空闲事务自动断开

# 5. 查询规划器配置
# 告诉 PG 操作系统缓存了多少数据
effective_cache_size = 2GB        # 适合 4-8GB RAM 的机器

# 6. 向量检索优化 (pgvector & 并行度)
# 开发环境减少并行度
max_parallel_maintenance_workers = 1 
max_parallel_workers = 2
max_parallel_workers_per_gather = 1

# 7. 日志记录 (开发环境详细日志)
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-dev-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_min_duration_statement = 500ms # 记录超过 500ms 的查询
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'all'             # 开发环境记录所有 SQL（便于调试）

# 8. 开发环境特定优化
autovacuum = on                   # 保持自动清理开启
autovacuum_max_workers = 2        # 减少自动清理工作进程
